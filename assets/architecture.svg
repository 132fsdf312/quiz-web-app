<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="white">系统架构图</text>
  <text x="400" y="56" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">System Architecture</text>

  <!-- ===== Layer 1: Users ===== -->
  <!-- Browser icons -->
  <rect x="30" y="80" width="130" height="80" rx="12" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="95" y="110" text-anchor="middle" font-family="monospace" font-size="26">🌐</text>
  <text x="95" y="138" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">学生浏览器</text>

  <rect x="200" y="80" width="130" height="80" rx="12" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <text x="265" y="110" text-anchor="middle" font-family="monospace" font-size="26">🌐</text>
  <text x="265" y="138" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">管理员浏览器</text>

  <!-- ===== Arrow down ===== -->
  <line x1="95" y1="160" x2="95" y2="210" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="95,215 90,205 100,205" fill="#667eea"/>
  <line x1="265" y1="160" x2="265" y2="210" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="265,215 260,205 270,205" fill="#667eea"/>

  <!-- ===== Layer 2: Nginx ===== -->
  <rect x="115" y="220" width="130" height="60" rx="12" fill="url(#purple)" filter="url(#shadow)"/>
  <text x="180" y="248" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">Nginx</text>
  <text x="180" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.8)">反向代理 + SSL</text>

  <!-- Arrow from nginx to express -->
  <line x1="180" y1="280" x2="180" y2="320" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="180,325 175,315 185,315" fill="#667eea"/>

  <!-- ===== Layer 3: Express ===== -->
  <rect x="60" y="330" width="240" height="60" rx="12" fill="url(#green)" filter="url(#shadow)"/>
  <text x="180" y="355" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">Express 后端</text>
  <text x="180" y="373" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.8)">Node.js · REST API · 自动评分</text>

  <!-- ===== Right side: Database ===== -->
  <line x1="300" y1="360" x2="430" y2="360" stroke="#38ef7d" stroke-width="2"/>
  <polygon points="435,360 425,355 425,365" fill="#38ef7d"/>

  <rect x="440" y="325" width="150" height="70" rx="12" fill="#white" opacity="0.95" filter="url(#shadow)"/>
  <text x="515" y="352" text-anchor="middle" font-family="monospace" font-size="24">🗄️</text>
  <text x="515" y="375" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">MySQL 8.0</text>

  <!-- ===== Bottom info ===== -->
  <rect x="620" y="80" width="155" height="120" rx="12" fill="white" opacity="0.08"/>
  <text x="697" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaa" font-weight="bold">技术栈</text>
  <text x="697" y="125" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">• Node.js / Express</text>
  <text x="697" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">• MySQL 8.0</text>
  <text x="697" y="155" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">• 原生 HTML/CSS/JS</text>
  <text x="697" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">• Docker</text>
  <text x="697" y="185" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">• Nginx</text>

  <!-- Legend -->
  <rect x="620" y="220" width="155" height="80" rx="12" fill="white" opacity="0.08"/>
  <rect x="635" y="236" width="12" height="12" rx="3" fill="url(#purple)"/>
  <text x="653" y="246" font-family="monospace" font-size="10" fill="#aaa">Nginx 反向代理</text>
  <rect x="635" y="256" width="12" height="12" rx="3" fill="url(#green)"/>
  <text x="653" y="266" font-family="monospace" font-size="10" fill="#aaa">Express 后端服务</text>
  <rect x="635" y="276" width="12" height="12" rx="3" fill="white"/>
  <text x="653" y="286" font-family="monospace" font-size="10" fill="#aaa">MySQL 数据库</text>
</svg>
