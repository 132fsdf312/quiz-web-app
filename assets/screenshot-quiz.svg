<svg xmlns="http://www.w3.org/2000/svg" width="650" height="600" viewBox="0 0 650 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="650" height="600" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="25" y="20" width="600" height="560" rx="20" fill="white" opacity="0.97" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="25" y="20" width="600" height="60" rx="20" fill="url(#header)"/>
  <rect x="25" y="60" width="600" height="20" fill="url(#header)"/>

  <!-- Student info -->
  <text x="55" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="white" opacity="0.9">👤 <tspan font-weight="bold">张三</tspan>（2024001）</text>

  <!-- Progress bar -->
  <text x="440" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="white">进度</text>
  <rect x="475" y="38" width="120" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="475" y="38" width="72" height="8" rx="4" fill="white"/>

  <!-- ===== Question 1: Choice ===== -->
  <rect x="55" y="100" width="540" height="150" rx="14" fill="#f8f9fc" stroke="none"/>
  <rect x="55" y="100" width="4" height="150" rx="2" fill="#667eea"/>

  <!-- Type badge -->
  <rect x="75" y="112" width="60" height="22" rx="20" fill="#e8f0fe"/>
  <text x="105" y="127" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#1967d2">选择题</text>

  <!-- Question text -->
  <circle cx="78" cy="158" r="14" fill="url(#header)"/>
  <text x="78" y="163" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">1</text>
  <text x="100" y="163" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#333">以下哪个不是JavaScript的数据类型？</text>

  <!-- Option A -->
  <rect x="80" y="180" width="230" height="40" rx="10" fill="white" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="102" cy="200" r="14" fill="#f0f0f0"/>
  <text x="102" y="205" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#666">A</text>
  <text x="124" y="204" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#444">String</text>

  <!-- Option B (selected) -->
  <rect x="325" y="180" width="250" height="40" rx="10" fill="url(#header)" stroke="#667eea" stroke-width="2"/>
  <circle cx="347" cy="200" r="14" fill="rgba(255,255,255,0.3)"/>
  <text x="347" y="205" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">B</text>
  <text x="369" y="204" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="white">Boolean</text>

  <!-- Option C -->
  <rect x="80" y="228" width="230" height="40" rx="10" fill="white" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="102" cy="248" r="14" fill="#f0f0f0"/>
  <text x="102" y="253" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#666">C</text>
  <text x="124" y="252" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#444">Float</text>

  <!-- Option D -->
  <rect x="325" y="228" width="250" height="40" rx="10" fill="white" stroke="#e8e8e8" stroke-width="2"/>
  <circle cx="347" cy="248" r="14" fill="#f0f0f0"/>
  <text x="347" y="253" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#666">D</text>
  <text x="369" y="252" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#444">Symbol</text>

  <!-- ===== Question 2: Judge ===== -->
  <rect x="55" y="270" width="540" height="100" rx="14" fill="#f8f9fc" stroke="none"/>
  <rect x="55" y="270" width="4" height="100" rx="2" fill="#667eea"/>

  <rect x="75" y="282" width="60" height="22" rx="20" fill="#fef7e0"/>
  <text x="105" y="297" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#f9ab00">判断题</text>

  <circle cx="78" cy="322" r="14" fill="url(#header)"/>
  <text x="78" y="327" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">2</text>
  <text x="100" y="327" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#333">HTML是一种编程语言。</text>

  <!-- Judge buttons -->
  <rect x="80" y="344" width="230" height="42" rx="10" fill="white" stroke="#e0e0e0" stroke-width="2"/>
  <text x="195" y="370" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#555">✓ 正确</text>

  <rect x="325" y="344" width="250" height="42" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="450" y="370" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#ea4335">✗ 错误</text>

  <!-- ===== Question 3: Essay ===== -->
  <rect x="55" y="390" width="540" height="110" rx="14" fill="#f8f9fc" stroke="none"/>
  <rect x="55" y="390" width="4" height="110" rx="2" fill="#667eea"/>

  <rect x="75" y="402" width="60" height="22" rx="20" fill="#e6f4ea"/>
  <text x="105" y="417" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#137333">简答题</text>

  <circle cx="78" cy="442" r="14" fill="url(#header)"/>
  <text x="78" y="447" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">3</text>
  <text x="100" y="447" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="600" fill="#333">请简述什么是面向对象编程（OOP）？</text>

  <!-- Textarea -->
  <rect x="80" y="460" width="490" height="30" rx="10" fill="white" stroke="#e0e0e0" stroke-width="2"/>
  <text x="95" y="480" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#ccc">在此输入你的回答...</text>

  <!-- Submit button -->
  <rect x="200" y="520" width="250" height="48" rx="12" fill="url(#green)"/>
  <text x="325" y="550" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="17" font-weight="bold" fill="white">提交答卷 ✓</text>
</svg>
