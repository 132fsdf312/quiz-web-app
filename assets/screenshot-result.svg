<svg xmlns="http://www.w3.org/2000/svg" width="550" height="600" viewBox="0 0 550 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="25" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="550" height="600" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="20" y="20" width="510" height="560" rx="24" fill="white" opacity="0.97" filter="url(#shadow)"/>
  <rect x="20" y="20" width="510" height="140" rx="24" fill="url(#green)"/>
  <rect x="20" y="120" width="510" height="40" fill="url(#green)"/>

  <!-- Trophy -->
  <text x="275" y="80" text-anchor="middle" font-size="55">🏆</text>
  <text x="275" y="115" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="white">答题完成！</text>
  <text x="275" y="140" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="white" opacity="0.85">以下是你的成绩详情</text>

  <!-- Score -->
  <text x="275" y="220" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="70" font-weight="800" fill="url(#green)">80</text>
  <text x="275" y="248" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#bbb">满分 90 分</text>

  <!-- Student info card -->
  <rect x="50" y="270" width="450" height="75" rx="16" fill="#f8f9fc"/>
  <line x1="60" y1="307" x2="490" y2="307" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>

  <text x="75" y="298" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#999">姓名</text>
  <text x="75" y="330" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#333">张三</text>

  <text x="300" y="298" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#999">学号</text>
  <text x="300" y="330" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#333">2024001</text>

  <!-- Stats grid -->
  <rect x="50" y="365" width="140" height="70" rx="12" fill="#f8f9fc"/>
  <text x="120" y="397" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" fill="#667eea">6</text>
  <text x="120" y="420" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999">答对题数</text>

  <rect x="205" y="365" width="140" height="70" rx="12" fill="#f8f9fc"/>
  <text x="275" y="397" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" fill="#667eea">2</text>
  <text x="275" y="420" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999">答错题数</text>

  <rect x="360" y="365" width="140" height="70" rx="12" fill="#f8f9fc"/>
  <text x="430" y="397" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" fill="#667eea">1</text>
  <text x="430" y="420" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999">未作答题数</text>

  <!-- Total -->
  <rect x="50" y="450" width="450" height="36" rx="12" fill="#f8f9fc"/>
  <text x="275" y="473" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#999">总题目数（正确+错误+未作答）</text>
  <text x="460" y="473" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#667eea">9</text>

  <!-- Buttons -->
  <rect x="60" y="510" width="200" height="48" rx="12" fill="url(#bg)"/>
  <text x="160" y="540" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="white">📥 下载成绩单</text>

  <rect x="280" y="510" width="200" height="48" rx="12" fill="white" stroke="#667eea" stroke-width="2"/>
  <text x="380" y="540" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#667eea">🔄 重新答题</text>
</svg>
